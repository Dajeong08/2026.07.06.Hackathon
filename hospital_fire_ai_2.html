<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>요양병원 방별 화재 관제 시스템 (GA 버전)</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        .flex-container { display: flex; gap: 30px; }
        .control-box { border: 2px solid #ccc; padding: 15px; width: 350px; }
        .room-grid { display: grid; grid-template-columns: repeat(3, 100px); gap: 10px; margin-top: 15px; }
        .room-btn { width: 100px; height: 60px; cursor: pointer; text-align: center; }
        .result-card { border-left: 4px solid red; background: #f9f9f9; padding: 10px; margin-bottom: 10px; }
        .weight-box { background: #eef; padding: 10px; margin-top: 15px; font-size: 13px; border-radius: 6px; }
        .floor-note { font-size: 12px; color: #888; margin-left: 6px; }
    </style>
</head>
<body>
    


    <h2>🚨 요양병원 방별 화재 대피 관제 시스템 (GA 버전)</h2>
    <hr>


    <div class="flex-container">
        <div>
            <h3>🏢 건물 관리 컨트롤러</h3>
            <div>
                <label>🔥 화재 발생 층: </label>
                <select id="fireFloor"></select>
                <button onclick="addFloor()">➕ 층 추가</button>
                <button onclick="removeFloor()">➖ 층 제거</button>
                <span class="floor-note">(최대 <span id="maxFloorLimitLabel"></span>층)</span>
            </div>
            <div style="margin-top:6px;">
                <button onclick="randomizePatients()">🎲 환자 랜덤 배치</button>
            </div>


            <h4 style="margin-bottom: 5px;">📍 현재 볼 층 선택</h4>
            <div id="floorSelector"></div>


            <h4 style="margin-bottom: 5px;"><span id="currentViewFloorLabel">2</span>층 내부 방 배치도 (방을 클릭하세요)</h4>
            <div id="roomContainer" class="room-grid"></div>
            <br>
            <button onclick="runEvacuationAI()" style="width:320px; height:40px; font-weight:bold;">🧬 AI 최우선 대피 순위 분석 가동</button>
        </div>


        <div class="control-box">
            <h3>📝 <span id="selectedRoomLabel">선택 없음</span> 환자 편집</h3>
            <div id="editorInputs">
                <p>방을 선택하면 입력창이 활성화됩니다.</p>
            </div>
            <br>
            <button id="saveBtn" onclick="saveRoomData()" disabled style="width:100%;">💾 현재 방 데이터 저장</button>
        </div>


        <div style="flex: 1;">
            <h3>⚡ 최우선 대피 지시서 (TOP 3 위험 방)</h3>
            <div id="resultList">
                <p style="color:#666;">분석 버튼을 누르면 가장 위험한 방 3곳이 정렬됩니다.</p>
            </div>
        </div>
    </div>


    <script>
        // ===============================================================
        // 아래 UI/데이터 관리 부분은 이전 버전과 거의 동일하며,
        // 층 추가/제거/제한 관련 부분만 새로 추가/수정했습니다.
        // (GA 알고리즘 파트는 전혀 건드리지 않았습니다)
        // ===============================================================
        let maxFloor = 4;
        let currentViewFloor = 2;
        let currentSelectedRoom = null;
        let hospitalData = {};


        // ⭐ 신규: 건물 최대 층수 제한 (이 숫자만 바꾸면 제한값 조절 가능)
        const MAX_FLOOR_LIMIT = 10;


        window.onload = function() {
            initData();
            document.getElementById('maxFloorLimitLabel').innerText = MAX_FLOOR_LIMIT;
            renderFireFloorOptions();
            renderFloorButtons();
            renderRooms();
        }


        function initData() {
            for (let f = 1; f <= 4; f++) createFloorData(f);
        }


        function createFloorData(f) {
            for (let r = 1; r <= 6; r++) {
                let roomKey = `${f}층-${r}호`;
                if (!hospitalData[roomKey]) {
                    hospitalData[roomKey] = {
                        A: (f===2 && r===1) ? 3 : (f===3 && r===2) ? 4 : 0,
                        B: (f===2 && r===3) ? 2 : 0,
                        C: 0, D: 0
                    };
                }
            }
        }


        // ⭐ 신규: 화재 발생 층 <select>의 옵션을 maxFloor 기준으로 다시 그림
        // (기존엔 1~4층이 HTML에 하드코딩돼 있어서, 층을 추가해도 5층 이상은
        //  화재 발생 층으로 선택할 수 없었던 문제를 해결)
        function renderFireFloorOptions() {
            const select = document.getElementById('fireFloor');
            const prevValue = select.value;
            select.innerHTML = "";
            for (let f = 1; f <= maxFloor; f++) {
                const opt = document.createElement('option');
                opt.value = f;
                opt.textContent = `${f}층`;
                select.appendChild(opt);
            }
            // 이전 선택값이 여전히 유효하면 유지, 아니면 기본값으로 보정
            if (prevValue && parseInt(prevValue) <= maxFloor) {
                select.value = prevValue;
            } else {
                select.value = Math.min(2, maxFloor);
            }
        }


        function addFloor() {
            // ⭐ 신규: 최대 층수 제한 체크
            if (maxFloor >= MAX_FLOOR_LIMIT) {
                alert(`최대 ${MAX_FLOOR_LIMIT}층까지만 추가할 수 있습니다.`);
                return;
            }
            maxFloor++;
            createFloorData(maxFloor);
            renderFireFloorOptions();
            renderFloorButtons();
            alert(`${maxFloor}층이 새롭게 빌딩 구조에 추가되었습니다.`);
        }


        // ⭐ 신규: 가장 위층(maxFloor)을 제거하는 함수
        // 최소 1개 층은 남아있어야 하며, 삭제 시 해당 층 환자 데이터도 함께 삭제됨
        function removeFloor() {
            if (maxFloor <= 1) {
                alert("최소 1개 층은 있어야 합니다.");
                return;
            }
            if (!confirm(`${maxFloor}층을 삭제하시겠습니까?\n해당 층의 환자 데이터도 함께 삭제됩니다.`)) {
                return;
            }


            // 삭제되는 층의 방 데이터 제거
            for (let r = 1; r <= 6; r++) {
                delete hospitalData[`${maxFloor}층-${r}호`];
            }


            maxFloor--;


            // 지금 보고 있던 층이 삭제된 층보다 크면(=삭제된 층이었으면) 보정
            if (currentViewFloor > maxFloor) {
                currentViewFloor = maxFloor;
                document.getElementById('currentViewFloorLabel').innerText = currentViewFloor;
            }


            renderFireFloorOptions();
            renderFloorButtons();
            renderRooms();
        }


        function renderFloorButtons() {
            const container = document.getElementById('floorSelector');
            container.innerHTML = "";
            for (let f = 1; f <= maxFloor; f++) {
                container.innerHTML += `<button onclick="changeViewFloor(${f})" style="margin-right:5px; font-weight:${f===currentViewFloor?'bold':'normal'}">${f}층</button>`;
            }
        }


        function changeViewFloor(f) {
            currentViewFloor = f;
            document.getElementById('currentViewFloorLabel').innerText = f;
            renderFloorButtons();
            renderRooms();
        }


        function renderRooms() {
            const container = document.getElementById('roomContainer');
            container.innerHTML = "";
            for (let r = 1; r <= 6; r++) {
                let roomKey = `${currentViewFloor}층-${r}호`;
                let data = hospitalData[roomKey];
                let totalPatients = data.A + data.B + data.C + data.D;
                container.innerHTML += `
                    <button class="room-btn" onclick="selectRoom('${roomKey}')">
                        <b>${r}호</b><br>(총 ${totalPatients}명)
                    </button>`;
            }
        }


        function selectRoom(roomKey) {
            currentSelectedRoom = roomKey;
            document.getElementById('selectedRoomLabel').innerText = roomKey;
            const data = hospitalData[roomKey];
            document.getElementById('editorInputs').innerHTML = `
                <p>와상(A): <input type="number" id="edit_A" value="${data.A}" min="0" style="width:60px;"> 명</p>
                <p>휠체어(B): <input type="number" id="edit_B" value="${data.B}" min="0" style="width:60px;"> 명</p>
                <p>자립(C): <input type="number" id="edit_C" value="${data.C}" min="0" style="width:60px;"> 명</p>
                <p>치매(D): <input type="number" id="edit_D" value="${data.D}" min="0" style="width:60px;"> 명</p>`;
            document.getElementById('saveBtn').disabled = false;
        }


        function saveRoomData() {
            if (!currentSelectedRoom) return;
            hospitalData[currentSelectedRoom] = {
                A: parseInt(document.getElementById('edit_A').value) || 0,
                B: parseInt(document.getElementById('edit_B').value) || 0,
                C: parseInt(document.getElementById('edit_C').value) || 0,
                D: parseInt(document.getElementById('edit_D').value) || 0
            };
            renderRooms();
            alert(`${currentSelectedRoom}의 환자 재실 정보가 성공적으로 기록되었습니다.`);
        }


        // ---- 🎲 모든 방에 환자를 무작위로 채워넣는 함수 (테스트/데모용) ----
        function randomizePatients() {
            for (let key in hospitalData) {
                hospitalData[key] = {
                    A: Math.floor(Math.random() * 4),  // 와상 0~3명
                    B: Math.floor(Math.random() * 3),  // 휠체어 0~2명
                    C: Math.floor(Math.random() * 4),  // 자립 0~3명
                    D: Math.floor(Math.random() * 3)   // 치매 0~2명
                };
            }
            renderRooms(); // 현재 보고 있는 층 화면 갱신
            alert("전체 병원에 환자가 무작위로 재배치되었습니다.");
        }




        // ===============================================================
        // ⭐ GA 파트 — 이전 버전과 완전히 동일 (알고리즘 미변경)
        // ===============================================================


        function randomChromosome() {
            return {
                fireFloorW: getRandom(0, 120),
                adjFloorW:  getRandom(0, 120),
                upperFloorW:getRandom(0, 120),
                lowerFloorW:getRandom(0, 120),
                wA: getRandom(0, 60),
                wB: getRandom(0, 60),
                wD: getRandom(0, 60),
                wC: getRandom(0, 60)
            };
        }


        function getRandom(min, max) { return Math.random() * (max - min) + min; }


        function getFloorWeight(roomFloor, fireFloor, c) {
            if (roomFloor === fireFloor) return c.fireFloorW;
            if (roomFloor === fireFloor + 1) return c.adjFloorW;
            if (roomFloor > fireFloor) return c.upperFloorW;
            return c.lowerFloorW;
        }


        function getPatientWeight(data, c) {
            return data.A * c.wA + data.B * c.wB + data.D * c.wD + data.C * c.wC;
        }


        function estimateAttendSeconds(data) {
            return data.A * 180 + data.B * 60 + data.D * 90 + data.C * 20;
        }


        function evaluatePenalty(chromosome) {
            let totalPenalty = 0;


            let candidateFireFloors = new Set();
            for (let key in hospitalData) {
                let d = hospitalData[key];
                if (d.A + d.B + d.C + d.D > 0) {
                    candidateFireFloors.add(parseInt(key.split('층')[0]));
                }
            }


            candidateFireFloors.forEach(hypoFireFloor => {
                let rooms = [];
                for (let key in hospitalData) {
                    let d = hospitalData[key];
                    let total = d.A + d.B + d.C + d.D;
                    if (total === 0) continue;


                    let floor = parseInt(key.split('층')[0]);
                    let score = getFloorWeight(floor, hypoFireFloor, chromosome) + getPatientWeight(d, chromosome);
                    rooms.push({ floor, data: d, score });
                }


                rooms.sort((a, b) => b.score - a.score);


                let elapsed = 0;
                rooms.forEach(r => {
                    elapsed += estimateAttendSeconds(r.data);
                    if (r.floor === hypoFireFloor) totalPenalty += elapsed * 2;
                    else if (Math.abs(r.floor - hypoFireFloor) === 1) totalPenalty += elapsed * 1.5;
                    else totalPenalty += elapsed;
                });
            });


            return totalPenalty;
        }


        function crossover(a, b) {
            const pick = (x, y) => Math.random() > 0.5 ? x : y;
            return {
                fireFloorW: pick(a.fireFloorW, b.fireFloorW),
                adjFloorW:  pick(a.adjFloorW, b.adjFloorW),
                upperFloorW:pick(a.upperFloorW, b.upperFloorW),
                lowerFloorW:pick(a.lowerFloorW, b.lowerFloorW),
                wA: pick(a.wA, b.wA),
                wB: pick(a.wB, b.wB),
                wD: pick(a.wD, b.wD),
                wC: pick(a.wC, b.wC)
            };
        }


        function mutate(c) {
            const keys = ["fireFloorW","adjFloorW","upperFloorW","lowerFloorW","wA","wB","wD","wC"];
            keys.forEach(k => {
                if (Math.random() < 0.1) {
                    c[k] = k.startsWith("w") ? getRandom(0, 60) : getRandom(0, 120);
                }
            });
        }


        function runGeneticAlgorithm() {
            const popSize = 30;
            const generations = 40;


            let population = [];
            for (let i = 0; i < popSize; i++) population.push(randomChromosome());


            for (let gen = 0; gen < generations; gen++) {
                population.forEach(c => c.penalty = evaluatePenalty(c));
                population.sort((a, b) => a.penalty - b.penalty);


                let parents = population.slice(0, popSize / 2);
                let next = [];
                while (next.length < popSize) {
                    let pa = parents[Math.floor(Math.random() * parents.length)];
                    let pb = parents[Math.floor(Math.random() * parents.length)];
                    let child = crossover(pa, pb);
                    mutate(child);
                    next.push(child);
                }
                population = next;
            }


            population.forEach(c => c.penalty = evaluatePenalty(c));
            population.sort((a, b) => a.penalty - b.penalty);
            return population[0];
        }




        function runEvacuationAI() {
            const fireFloor = parseInt(document.getElementById('fireFloor').value);


            const best = runGeneticAlgorithm();


            let evaluationResults = [];
            for (let roomKey in hospitalData) {
                let data = hospitalData[roomKey];
                let total = data.A + data.B + data.C + data.D;
                if (total === 0) continue;


                let floor = parseInt(roomKey.split('층')[0]);
                let score = getFloorWeight(floor, fireFloor, best) + getPatientWeight(data, best);


                evaluationResults.push({
                    room: roomKey,
                    score: score,
                    details: `와상 ${data.A}/휠체어 ${data.B}/치매 ${data.D}/자립 ${data.C}`
                });
            }


            evaluationResults.sort((a, b) => b.score - a.score);
            const top3 = evaluationResults.slice(0, 3);


            const rl = document.getElementById('resultList');
            rl.innerHTML = "";


            if (top3.length === 0) {
                rl.innerHTML = "<p>병원 내에 등록된 환자가 없습니다.</p>";
                return;
            }


            top3.forEach((res, idx) => {
                rl.innerHTML += `
                    <div class="result-card">
                        <b>🥇 ${idx + 1}순위 통제 대상: ${res.room}</b><br>
                        <small>재실자 분포: ${res.details}</small><br>
                        <small>연산된 위험 적합도 점수: ${res.score.toFixed(1)}점</small>
                    </div>`;
            });


            rl.innerHTML += `
                <div class="weight-box">
                    <b>🧬 이번에 AI가 찾아낸 가중치</b><br>
                    화재층: ${best.fireFloorW.toFixed(1)} / 직상층: ${best.adjFloorW.toFixed(1)} /
                    그외상층: ${best.upperFloorW.toFixed(1)} / 하부층: ${best.lowerFloorW.toFixed(1)}<br>
                    와상: ${best.wA.toFixed(1)} / 휠체어: ${best.wB.toFixed(1)} /
                    치매: ${best.wD.toFixed(1)} / 자립: ${best.wC.toFixed(1)}
                </div>`;
        }
    </script>
</body>
</html>
